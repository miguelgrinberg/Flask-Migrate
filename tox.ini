[tox]
skip_missing_interpreters=True

[testenv]
commands=
    pip install -e .
    pip install {env:SQLALCHEMY_VERSION:sqlalchemy>=2}
    pytest -p no:logging
deps=
    pytest

[testenv:flake8]
deps=
    flake8
commands=
    flake8 --exclude=".*" src/flask_migrate tests

[testenv:docs]
changedir=docs
deps=
    sphinx
allowlist_externals=
    make
commands=
    make html
